    <h2 class="topic">Contact Us</h2>
<div class="what-is-GFE">
    <p>We are here to help. If you have questions, feedback, or need support, get in touch with us.</p>
    <form class="contact-form">
        <div class="mb-3">
            <input name="full_name" type="text" class="form-control" id="exampleInputName" placeholder="Full name">
        </div>
        <div class="mb-3">
            <input name="email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Email address">
        </div>
        <div class="mb-3">
            <input name="phone" type="number" class="form-control" id="exampleInputPhone" placeholder="Phone number">
        </div>
        <div class="mb-3">
            <input name="subject" type="text" class="form-control" id="exampleInputSubject" placeholder="Subject">
        </div>
        <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Message</label>
            <textarea name="message" class="form-control" id="exampleFormControlTextarea1" rows="4"></textarea>
        </div>
        <button type="submit" class="login-btn">Send Message</button>
        <p><label class="form-last-label">We usually reply within a few hours.</label></p>
    </form>
</div>
<div class="contact-info">
    <p><img src="./Assets/mark_email_unread.png"> support@gfe.com</p>
    <p><img src="./Assets/Phone.png">Phone: +3583397629</p>
    <p><img src="./Assets/location_on.png">Location: Finland</p>
</div>

<div class="last-line">
    <p>We aim to respond as soon as possible.</p>
</div>
<script type="module" src="js/contact.js"></script>
