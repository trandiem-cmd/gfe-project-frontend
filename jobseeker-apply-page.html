<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Apply Job</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="jobseeker-apply-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="jobseeker-inbox.html">
        <img src="./Assets/mark_email_unread.png" class="inbox-icon">
      </a>
      <a href="index.html" class="logout-btn">Log out</a>
      <img src="./Assets/menu-icon.png" class="menu-icon" id="menuBtn">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" id="closeBtn">✕</span>
      </div>
      <div class="menu-links">
        <a href="jobseeker-job-offers.html">Search</a>
        <a href="jobseeker-profile-page.html">My profile</a>
        <a href="jobseeker-dashboard.html">Dashboard</a>
        <a href="jobseeker-inbox.html">Messages</a>
        <a href="jobseeker-application.html">My applications</a>
        <a href="jobseeker-saved-jobs.html">❤️ Saved jobs</a>
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <div class="apply-container">
    <h3 class="apply-title"></h3>
    <p class="apply-schedule"></p>
    <p class="apply-location">
      <img src="./Assets/location_on.png" class="location-icon">
      Helsinki • €15/hour
    </p>

    <form class="apply-form">
      <input type="text" placeholder="Name" class="apply-name" name="applyName">
      <input type="email" placeholder="Email" class="apply-email" name="applyEmail">
      <textarea placeholder="Tell us why you're a good fit..." maxlength="500" name="applyCoverLetter"></textarea>
      <label class="file-upload">
        <img src="./Assets/File.png" class="cv-icon">
        <span>Attach CV (optional)</span>
        <input type="file" name="cv">
      </label>
      <button type="submit" class="submit-btn">Submit Application</button>
      <a href="jobseeker-application.html" class="view-link">
        View my past applications
      </a>
    </form>
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/jobseeker.js" defer type="module"></script>
</body>
</html>
