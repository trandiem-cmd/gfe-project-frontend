<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- MASHAIR - font awesome for eye icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="client-profile-page">

  <div class="top-bar">
    <a href="index.html"><img src="./Assets/GFE logo.png" class="logo"></a>
    <div class="right-side">
      <button class="logout-btn logout-action">Log out</button>
      <img src="./Assets/menu-icon.png" class="menu-icon" id="menuBtn">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" id="closeBtn">✕</span>
      </div>
      <div class="menu-links">
        <a href="client-candidate.html">Search</a>
        <a href="client-dashboard.html">My dashboard</a>
        <a href="client-inbox.html">Messages</a>
        <a href="client-jobads.html">My job ads</a>
        <a href="client-post.html">Post a new job</a>
        <a href="client-profile.html">My profile</a>
      </div>
      <div class="menu-bottom">
        <a href="#" class="logout-small logout-action">Log out</a>
      </div>
    </div>
  </div>

  <div class="profile-container">

    <div class="profile-header">
      <img src="" class="profile-img" id="profile-img">
      <div class="profile-info">
        <h4 id="header-name">Alex Johnson</h4>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-box">
        <div class="exp-row"> 
          <label>👤 Name</label>
          <div class="exp-value" id="name-display"></div>
          <input type="text" id="name-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📞 Phone</label>
          <div class="exp-value" id="phone-display"></div>
          <input type="text" id="phone-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📧 Email</label>
          <div class="exp-value" id="email-display"></div>
          <input type="text" id="email-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📍 Location</label>
          <div class="exp-value" id="location-display"></div>
          <div id="location-input-wrapper" class="d-none">
            <input type="text" id="location-input" class="form-control mb-2" readonly>
            <select id="edit-city" class="form-select mb-2">
              <option value="">Select city</option>
              <option value="Helsinki">Helsinki</option>
              <option value="Espoo">Espoo</option>
              <option value="Vantaa">Vantaa</option>
              <option value="Tampere">Tampere</option>
              <option value="Turku">Turku</option>
              <option value="Oulu">Oulu</option>
            </select>
            <select id="edit-district" class="form-select">
              <option value="">Select district</option>
            </select>
          </div>
        </div>

        <div class="exp-row">
          <label>🔒 Password</label>
          <!-- display -->
          <div id="password-display">********</div>
          <!-- MASHAIR - added eye icons to password fields (same as jobseeker profile) -->
          <div id="password-input-wrapper" class="d-none">
            <div style="position:relative;">
              <input type="password" id="current-password" class="form-control mb-2" placeholder="Current password">
              <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:35%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
            </div>
            <div style="position:relative;">
              <input type="password" id="new-password" class="form-control mb-2" placeholder="New password">
              <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:35%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
            </div>
            <div style="position:relative;">
              <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password">
              <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:35%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="profile-actions">
      <button class="edit-btn" id="editBtn">Edit your profile</button>
      <button class="edit-btn d-none" id="saveBtn">Save changes</button>
      <button class="pause-btn" id="cancelBtn" style="display:none;">Cancel</button>
      <button class="delete-btn" id="deleteBtn">Delete account</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="about.html">About us</a>
      <a href="contact.html">Contact us</a>
      <a href="faq.html">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/client/client-shared.js" type="module" defer></script>
  <script src="js/client/client-profile.js" type="module" ></script>
  <script src="js/logout.js" type="module" ></script>
</body>
</html>
