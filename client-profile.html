<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="client-profile-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="index.html" class="logout-btn">Log out</a>
      <img src="./Assets/menu-icon.png" class="menu-icon" onclick="openMenu()">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <img src="./Assets/candidate img2.png" class="menu-profile">
        <span class="close-btn" onclick="closeMenu()">✕</span>
      </div>
      <div class="menu-links">
        <a href="client-post.html">Post a new job</a>
        <a href="client-profile.html">My profile</a>
        <a href="client-inbox.html">Messages</a>
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <div class="profile-container">

    <div class="profile-header">
      <img src="./Assets/candidate img2.png" class="profile-img">
      <div class="profile-info">
        <h4 id="header-name">Alex Johnson</h4>
        <p id="about-display"></p>
        <textarea id="about-input" class="form-control d-none"></textarea>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-box">
        <div class="exp-row"> 
          <label>👤 Name</label>
          <div class="exp-value" id="name-display"></div>
          <input type="text" id="name-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📞 Phone</label>
          <div class="exp-value" id="phone-display"></div>
<input type="text" id="phone-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📧 Email</label>
          <div class="exp-value" id="email-display"></div>
<input type="text" id="email-input" class="form-control d-none">
        </div>
        <div class="exp-row">
          <label>📍 Location</label>
          <div class="exp-value" id="location-display"></div>
<input type="text" id="location-input" class="form-control d-none">
        </div>
      </div>
    </div>

    <div class="profile-section">
      <h4>Available services</h4>
      <div class="tags">
        <span class="tag">Cleaning</span>
        <span class="tag">Childcare</span>
        <span class="tag">Elderly care</span>
      </div>
    </div>

    

    <div class="profile-actions">
      <button class="edit-btn" id="editBtn">Edit your profile</button>
      <button class="edit-btn d-none" id="saveBtn">Save changes</button>
      <button class="pause-btn" id="cancelBtn" style="display:none;">Cancel</button>
      <button class="delete-btn">Delete account</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="about.html">About us</a>
      <a href="contact.html">Contact us</a>
      <a href="faq.html">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function openMenu() { document.getElementById("menuOverlay").style.display = "flex"; }
  function closeMenu() { document.getElementById("menuOverlay").style.display = "none"; }
  </script>
<script type="module" src="./js/profile.js"></script>
</body>
</html>
