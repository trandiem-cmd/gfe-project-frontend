<body class="jobseeker-inbox-page">
  
      <div class="top-bar">
        <img src="./Assets/GFE logo.png" class="logo">
        <div class="right-side">
          <button class="logout-btn logout-action">Log out</button>
          <img src="./Assets/menu-icon.png" class="menu-icon" id="menuBtn">
        </div>
      </div>

      <div id="menuOverlay" class="menu-overlay" style="display: none;">
        <div class="menu-card">
          <div class="menu-top">
            <span class="close-btn" id="closeBtn">✕</span>
          </div>
          <div class="menu-links">
            <a href="jobseeker-job-offers.html">Search</a>
            <a href="jobseeker-profile-page.html">My profile</a>
            <a href="jobseeker-dashboard.html">Dashboard</a>
            <a href="jobseeker-inbox.html">Messages</a>
            <a href="jobseeker-application.html">My applications</a>
            <a href="jobseeker-saved-jobs.html">❤️ Saved jobs</a>
          </div>
          <div class="menu-bottom">
            <a href="#" class="logout-small logout-action">Log out</a>
          </div>
        </div>
      </div>
<div class="inbox-container">

    <div id="listView">
      <div class="inbox-header">
        <h3 class="inbox-title">Messages</h3>
        <p class="inbox-sub">Stay connected with clients and manage your conversations easily.</p>
      </div>

      <div class="message-list" id="messageList"></div>
    </div>

    <div id="chatView" style="display:none;">
      <div class="top-bar">
        <button id="backBtn" style="background:none; border:none; color:#572290; font-size:20px; cursor:pointer;">←</button>
        <strong id="chatPersonName" style="color:#572290; font-size:16px;"></strong>
        <div class="right-side">
      
        </div>
      </div>
      <div class="chat-box" id="chatBox" style="height:70vh; overflow-y:auto;"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
</div>
  </div>

  <footer class="footer">
