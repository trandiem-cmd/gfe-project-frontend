<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- MASHAIR - font awesome for eye icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="jobseeker-profile-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <button class="logout-btn logout-action">Log out</button>
      <img src="./Assets/menu-icon.png" class="menu-icon" id="menuBtn">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" id="closeBtn">✕</span>
      </div>
      <div class="menu-links">
        <a href="jobseeker-job-offers.html">Search</a>
        <a href="jobseeker-dashboard.html">Dashboard</a>
        <a href="jobseeker-profile-page.html">My profile</a>
        <a href="jobseeker-inbox.html">Messages</a>
        <a href="jobseeker-application.html">My applications</a>
        <a href="jobseeker-saved-jobs.html">❤️ Saved jobs</a>
      </div>
      <div class="menu-bottom">
        <a href="#" class="logout-small logout-action">Log out</a>
      </div>
    </div>
  </div>

  <div class="profile-container" style="visibility:hidden;">

    <div class="profile-header">
      <img src="" class="profile-img" id="profile-img">
      <div class="profile-info">
        <h4 id="profile-name"></h4>
        <p id="profile-service-text"></p>
        <p id="profile-location-text"></p>
      </div>
    </div>

    <div class="profile-rating"></div>

    <div class="profile-section">
      <h4>About me</h4>
      <div class="profile-box">
        <p id="about-text"></p>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-box">
        <div class="exp-row">
          <label>👤 Name</label>
          <div class="exp-value" id="name-text"></div>
        </div>
        <div class="exp-row">
          <label>📞 Phone</label>
          <div class="exp-value" id="phone-text"></div>
        </div>
        <div class="exp-row">
          <label>📧 Email</label>
          <div class="exp-value" id="email-text"></div>
        </div>
        <div class="exp-row">
          <label>📍 Location</label>
          <div class="exp-value" id="location-text"></div>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <h4>Available services</h4>
      <div class="tags" id="services-tags"></div>
    </div>

    <div class="profile-section">
      <h4>Skills</h4>
      <div class="tasks" id="skills-tasks"></div>
    </div>

    <div class="profile-section">
      <h4>Your experience</h4>
      <p class="section-sub">Share your experience and your rate</p>
      <div class="profile-box">
        <div class="exp-row">
          <label>Experience</label>
          <div class="exp-value" id="experience-text"></div>
        </div>
        <div class="exp-row">
          <label>Hourly rate</label>
          <div class="exp-value" id="rate-text"></div>
        </div>
      </div>
    </div>

    <div class="profile-section">
  <h4>Change password</h4>
  <div class="profile-box">

    <!-- MASHAIR - added eye icon to current password -->
    <div class="exp-row">
      <label>Current password</label>
      <div style="position:relative;">
        <input type="password" id="current-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
      </div>
    </div>

    <!-- MASHAIR - added eye icon to new password -->
    <div class="exp-row">
      <label>New password</label>
      <div style="position:relative;">
        <input type="password" id="new-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
      </div>
    </div>

    <!-- MASHAIR - added eye icon to confirm password -->
    <div class="exp-row">
      <label>Confirm password</label>
      <div style="position:relative;">
        <input type="password" id="confirm-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        <span class="fa fa-eye-slash toggle-pw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); cursor:pointer; color:#572290;"></span>
      </div>
    </div>

    <button id="change-password-btn" style="background: linear-gradient(to right, #7b3fe4, #3B1664); color:white; border:none; padding:8px 16px; border-radius:10px; margin-top:10px;">Change password</button>
  </div>
</div>

    <div class="profile-actions">
      <button class="edit-btn" id="editBtn">Edit your profile</button>
      <button class="pause-btn" id="pauseBtn" style="background:#e4dbe6;">Deactivate account</button>
      <button class="delete-btn" id="deleteBtn">Delete account</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/jobseeker/jobseeker-shared.js" type="module" defer></script>
  <script src="js/jobseeker/jobseeker-profile.js" type="module" defer></script>
  <script type="module" src="js/logout.js"></script>
</body>
</html>
