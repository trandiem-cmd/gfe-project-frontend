<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
        <div class="login-dropdown ms-auto">
            <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
            <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="./faq.html">FAQ</a></li>
            </ul>
        </div>
        </div>
    </nav>
    <div class="content">
      <div class="content-poster">
          <h1>Complete your profile</h1>
          <h2>Choose a date and time that works best for you</h2>
      </div>
      <h5 class="mt-4">Step 3 of 4</h5>
      <div class="progress-custom mb-2">
          <div class="progress-bar-custom3"></div>
      </div>
      <div class="mb-4">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
      </div>
      <h4 class="fw-bold mt-4">My schedule</h4>
      <form id="profileForm">

        <div class="mb-3">
          <label>My schedule</label>
          <input type="text" class="form-control" id="service-schedule" placeholder="Enter your schedule">
        </div>
    <div class="mb-3">
      <div class="location-wrapper">
        <label>Location</label>
        <input type="text" id="service-location" class="form-control" placeholder="Select location" readonly>

        <div id="locationDropdown" class="dropdown-box d-none">
          <select id="city" class="form-select mb-2">
            <option value="">Select city</option>
            <option value="Helsinki">Helsinki</option>
            <option value="Espoo">Espoo</option>
            <option value="Vantaa">Vantaa</option>
            <option value="Tampere">Tampere</option>
            <option value="Turku">Turku</option>
            <option value="Oulu">Oulu</option>
          </select>

          <select id="district" class="form-select">
            <option value="">Select district</option>
          </select>
        </div>
      </div>
    </div>
        <div class="mb-3">
          <label>Pay rate</label>
          <div class="input-group">
            <input type="text" class="form-control" id="service-pay-rate" placeholder="Enter hourly rate">
            <span class="input-group-text" style="background-color: #f0e9f0;">€/hour</span>
          </div>
        </div>
        <!-- Frequency -->
        <div>
          <label>Frequency</label>
          <div class="frequency-group mt-2">
            <button type="button" class="frequency-btn active" data-value="regular">Regular</button>
            <button type="button" class="frequency-btn" data-value="occasional">Occasional</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="back-btn" id="back2-btn1">Back</button>
          <button type="button" class="next-btn" id="next3-btn1">Next →</button>
        </div>
      </form>

    <p class="add-logo">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    </p>
    <footer class="footer">

  <div class="footer-links">
    <a href="./about.html">About us</a>
    <a href="./contact.html">Contact us</a>
    <a href="./faq.html">FAQ</a>
  </div>

  <div class="footer-line"></div>

  <p>© 2026 GFE — All rights reserved</p>

</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/client.js" type="module"></script>
</body>
</html>
