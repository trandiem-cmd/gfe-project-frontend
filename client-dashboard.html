<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Gig For Everyone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="client-dashboard-page">
  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="index.html" class="logout-btn" id="logout-btn">log out</a>
          <img src="./Assets/menu-icon.png" class="menu-icon" onclick="openMenu()">
      </a>
    </div>
  </div>
  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <img src="./Assets/candidate img2.png" class="menu-profile">
        <span class="close-btn" onclick="closeMenu()">✕</span>
      </div>
      <div class="menu-links">
      <a href="client-jobdetails.html">Search</a>
        <a href="client-profile.html">My profile</a>
        <a href="client-inbox.html">Messages</a>
        <a href="client-post.html">Post a new job</a>
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <section class="welcome">
    <h2 id="welcomeName">Hello 👋</h2>
    <p>Welcome back! Find jobs and manage your applications.</p>
  </section>

  <section class="job-post" style="margin-left: 20px;">
    <a href="client-post.html" class="btn btn">Post a new job</a>
  </section>

  <section class="jobs">
    <h3 class="mt-4">View your posts</h3>
    <div id="job-list"></div>
  </section>

  <section class="jobs">
    <h3 class="mt-4">Recommend candidates</h3>
    <div id='jobseeker-list'></div>
  </section> 

  <section class="find-candidates">
    <h3 class="mt-4">Find candidates by service</h3>
    <div id="jobseeker-by-service"></div>
    <div class="find-by-services">
        <button type="button" class="find-by-service-btn" data-value="cleaning">🧼 Cleaning <span id="test"></span></button>
        <button type="button" class="find-by-service-btn" data-value="childcare">🧸 Childcare</button>
        <button type="button" class="find-by-service-btn" data-value="eldercare">👴🏻 Eldercare</button>
    </div>
    <div id="jobseeker-by-service-list"></div>
  </section>

  
  <footer class="footer">
    <div class="footer-links">
      <a href="./about.html">About us</a>
      <a href="./contact.html">Contact us</a>
      <a href="./faq.html">FAQ</a>
    </div>

    <div class="footer-line"></div>

    <p>© 2026 GFE — All rights reserved</p>
  </footer>

</body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/client.js" type="module"></script>
  <script>
     const currentUser = JSON.parse(sessionStorage.getItem('user'));

    if (currentUser) {
      // fetch real user data
      fetch(`http://localhost:3001/user/${currentUser.id}`)
        .then(res => res.json())
        .then(user => {
          // show first name
          const firstName = user.fullname ? user.fullname.split(' ')[0] : currentUser.email.split('@')[0];
          document.querySelector('.welcome h2').textContent = `Hello, ${firstName} 👋`;

          // show photo
          if (user.photo) {
            document.getElementById('profilePic').src = `http://localhost:3001/uploads/${user.photo}`;
          }
        });
      }
    function openMenu() {
      document.getElementById("menuOverlay").style.display = "flex";
    }
    function closeMenu() {
      document.getElementById("menuOverlay").style.display = "none";
    }
</script>
</body>
</html>
