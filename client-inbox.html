<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Client Inbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="client-inbox-page">
  <div class="inbox-container">

    <div id="listView">
      <div class="top-bar">
        <img src="./Assets/GFE logo.png" class="logo">
        <div class="right-side">
          <img src="./Assets/mark_email_unread (2).png" class="inbox-icon">
          <a href="index.html" class="logout-btn">Log out</a>
        </div>
      </div>
      <div class="inbox-header">
        <h3 class="inbox-title">Messages</h3>
        <p class="inbox-sub">Stay connected with candidates and manage your conversations easily.</p>
      </div>
      <div class="message-list" id="messageList"></div>
    </div>

    <div id="chatView" style="display:none;">
      <div class="top-bar">
        <button onclick="showList()" style="background:none; border:none; color:#572290; font-size:20px; cursor:pointer;">←</button>
        <strong id="chatPersonName" style="color:#572290; font-size:16px;"></strong>
        <div class="right-side">
          <a href="index.html" class="logout-btn">Log out</a>
        </div>
      </div>
      <div class="chat-box" id="chatBox" style="height:70vh; overflow-y:auto;"></div>
      <div class="chat-input">
        <input type="text" placeholder="Type a message...">
        <button class="send-btn">➤</button>
      </div>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
const BACKEND_URL = "http://localhost:3001";
const currentUser = JSON.parse(sessionStorage.getItem('user'));
let selectedReceiverId = null;
let allMessages = [];

function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('chatView').style.display = 'none';
}

function showChat(name) {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('chatView').style.display = 'block';
  document.getElementById('chatPersonName').textContent = name;
}

async function loadJobseekers() {
  const msgResponse = await fetch(`${BACKEND_URL}/inbox/${currentUser.id}`);
  allMessages = await msgResponse.json();

  // get only users who have messages with current user
  const userIds = [...new Set(allMessages.map(m =>
    m.sender_id === currentUser.id ? m.receiver_id : m.sender_id
  ))];

  const list = document.getElementById('messageList');
  list.innerHTML = '';

  if (userIds.length === 0) {
    list.innerHTML = '<p style="padding:20px; color:#572290;">No messages yet</p>';
    return;
  }

  const response = await fetch(`${BACKEND_URL}/user/jobseekers`);
  const jobseekers = await response.json();
  const filtered = jobseekers.filter(j => userIds.includes(j.id));

  filtered.forEach(jobseeker => {
    const unread = allMessages.filter(m => m.sender_id === jobseeker.id && m.read === false);
    const lastMsg = allMessages.filter(m =>
      (m.sender_id === jobseeker.id && m.receiver_id === currentUser.id) ||
      (m.receiver_id === jobseeker.id && m.sender_id === currentUser.id)
    ).slice(-1)[0];

    const item = document.createElement('div');
    item.className = 'message-item';
    item.innerHTML = `
      <img src="${jobseeker.photo ? 'http://localhost:3001/uploads/' + jobseeker.photo : './Assets/candidate img2.png'}" class="profile-icon">
      <div>
        <strong>${jobseeker.fullname}</strong>
        <small class="service-label">${jobseeker.services || ''}</small>
        <p>${lastMsg ? lastMsg.message_text.substring(0, 30) + '...' : 'No messages yet'}</p>
      </div>
      ${unread.length > 0 ? `<span class="badge">${unread.length}</span>` : ''}
    `;

    item.addEventListener('click', () => {
      selectedReceiverId = jobseeker.id;
      showChat(jobseeker.fullname);
      loadMessages(jobseeker.id);
    });

    list.appendChild(item);
  });
}

async function loadMessages(receiverId) {
  const response = await fetch(`${BACKEND_URL}/inbox/${currentUser.id}`);
  const messages = await response.json();
  const chatBox = document.getElementById('chatBox');
  chatBox.innerHTML = '';

  const filtered = messages.filter(msg =>
    (msg.sender_id === currentUser.id && msg.receiver_id === receiverId) ||
    (msg.receiver_id === currentUser.id && msg.sender_id === receiverId)
  );

  filtered.forEach(msg => {
    const div = document.createElement('div');
    div.className = msg.sender_id === currentUser.id ? 'chat-message right' : 'chat-message left';
    div.textContent = msg.message_text;
    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

document.querySelector('.chat-input button').addEventListener('click', async () => {
  const input = document.querySelector('.chat-input input');
  const message = input.value.trim();
  if (message !== '' && selectedReceiverId) {
    await fetch(`${BACKEND_URL}/inbox`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sender_id: currentUser.id,
        receiver_id: selectedReceiverId,
        message_text: message
      })
    });
    input.value = '';
    loadMessages(selectedReceiverId);
  }
});

document.querySelector('.chat-input input').addEventListener('keypress', e => {
  if (e.key === 'Enter') document.querySelector('.chat-input button').click();
});

loadJobseekers();
  </script>
</body>
</html>
