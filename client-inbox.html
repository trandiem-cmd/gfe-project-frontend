<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Client Inbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="client-inbox-page">

  <div class="top-bar">
    <a href="index.html"><img src="./Assets/GFE logo.png" class="logo"></a>
    <div class="right-side">
      <button class="logout-btn logout-action">Log out</button>
      <!-- MASHAIR - removed onclick, using id instead -->
      <img src="./Assets/menu-icon.png" class="menu-icon" id="menuBtn">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <!-- MASHAIR - removed onclick, using id instead -->
        <span class="close-btn" id="closeBtn">✕</span>
      </div>
      <div class="menu-links">
        <a href="client-candidate.html">Search</a>
        <a href="client-dashboard.html">My dashboard</a>
        <a href="client-inbox.html">Messages</a>
        <a href="client-jobads.html">My job ads</a>
        <a href="client-post.html">Post a new job</a>
        <a href="client-profile.html">My profile</a>
      </div>
      <div class="menu-bottom">
        <a href="#" class="logout-small logout-action">Log out</a>
      </div>
    </div>
  </div>

  <div class="inbox-container">

    <div id="listView">
      <div class="inbox-header">
        <h3 class="inbox-title">Messages</h3>
        <p class="inbox-sub">Stay connected with candidates and manage your conversations easily.</p>
      </div>
      <div class="message-list" id="messageList"></div>
    </div>

    <div id="chatView" style="display:none;">
      <div class="top-bar">
        <!-- MASHAIR - removed onclick, using id instead -->
        <button id="backBtn" style="background:none; border:none; color:#572290; font-size:20px; cursor:pointer;">←</button>
        <strong id="chatPersonName" style="color:#572290; font-size:16px;"></strong>
        <div class="right-side">
    
        </div>
      </div>
      <div class="chat-box" id="chatBox" style="height:70vh; overflow-y:auto;"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="about.html">About us</a>
      <a href="contact.html">Contact us</a>
      <a href="faq.html">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- MASHAIR - moved inline scripts to client-inbox.js -->
  <script type="module" src="js/client/client-inbox.js"></script>
  <script type="module" src="js/logout.js"></script>
</body>
</html>
