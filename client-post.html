    <div class="content">
   
    <h1 class="fw-bold mt-4">Post a job</h1>

      <form id="profileForm">
        <label>Choose a service</label>
        <div class="service-item active" data-value="childcare">
          <div>
            <div class="service-title">🧸 Childcare</div>
            <small>Babysitting, tutoring, daycare...</small>
          </div>
          <div class="radio-circle"></div>
        </div>
        <div class="service-item" data-value="cleaning">
          <div>
            <div class="service-title">🧼 Cleaning</div>
            <small>Housekeeping, maid, janitor...</small>
          </div>
          <div class="radio-circle"></div>
        </div>
        <div class="service-item" data-value="eldercare">
          <div>
            <div class="service-title">👴🏻 Eldercare</div>
            <small>Daily help, companionship, support...</small>
          </div>
          <div class="radio-circle"></div>
        </div>
        <div>
          <label class="mb-2">Add a title</label>
          <textarea rows="1" type="text" class="form-control" id="job-title"></textarea>
        </div>
        <div>
          <label class="mb-2">Describe your needs</label>
          <textarea rows="3" type="text" class="form-control" id="service-description"></textarea>
        </div>
        <div class="mb-3">
            <div class="location-wrapper">
                <label>Location</label>
                <input type="text" id="service-location" class="form-control" placeholder="Select location" readonly>

                <div id="locationDropdown" class="dropdown-box d-none">
                <select id="city" class="form-select mb-2">
                    <option value="">Select city</option>
                    <option value="Helsinki">Helsinki</option>
                    <option value="Espoo">Espoo</option>
                    <option value="Vantaa">Vantaa</option>
                    <option value="Tampere">Tampere</option>
                    <option value="Turku">Turku</option>
                    <option value="Oulu">Oulu</option>
                </select>

                <select id="district" class="form-select">
                    <option value="">Select district</option>
                </select>
                </div>
            </div>
        </div>
        <div class="mb-3">
          <label>My schedule</label>
          <input type="text" class="form-control" id="service-schedule" placeholder="Enter your schedule">
        </div>
        <div class="mb-3">
          <label>Pay rate</label>
          <div class="input-group">
            <input type="text" class="form-control" id="service-pay-rate" placeholder="Enter hourly rate">
            <span class="input-group-text" style="background-color: #f0e9f0;">€/hour</span>
          </div>
        </div>
        <div>
          <label>Frequency</label>
          <div class="frequency-group mt-2">
            <button type="button" class="frequency-btn active" data-value="regular">Regular</button>
            <button type="button" class="frequency-btn" data-value="occasional">Occasional</button>
          </div>
        </div>
        <div class="form-actions">
              <button type="button" class="back-btn" id="back1-btn1">Back</button>
              <button type="sumit" class="next-btn" id="jobpost-submit-btn1">Post your job</button>
        </div>
        
      </form>
